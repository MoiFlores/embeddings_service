services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: embeddings-api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - hf_cache:/app/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # qdrant image is minimal and does not include wget/curl.
      # Check that REST port 6333 is listening (hex 18BD in /proc/net/tcp*).
      test: ["CMD-SHELL", "grep -q ':18BD' /proc/net/tcp /proc/net/tcp6 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  hf_cache:       # Modelo descargado persiste entre reinicios
  qdrant_data:    # Embeddings almacenados persisten
